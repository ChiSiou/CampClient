<div class="container">
  <h2>🎒 加購露營裝備</h2>
  <p class="hint">不需要裝備也可以直接結帳。</p>

  <div *ngIf="loading()" class="loading">裝備清單載入中...</div>
  <div *ngIf="errorMessage()" class="error">{{ errorMessage() }}</div>

  <div *ngIf="!loading()" class="gear-grid">
    <div class="gear-card" *ngFor="let product of equipmentList()">
      <img [src]="product.mainImageUrl || 'assets/default-gear.png'" alt="{{ product.name }}" />
      <h3>{{ product.name }}</h3>
      <a [routerLink]="['equipment', product.productId]" queryParamsHandling="preserve">查看詳情</a>

      <div class="variant-row" *ngFor="let v of product.variants">
        <span class="variant-name">{{ v.variantName }}</span>
        <span class="price">${{ v.dailyRentalPrice }} / 天</span>
        <span class="stock" [class.out]="v.availableStock === 0">庫存 {{ v.availableStock }}</span>

        <div class="qty-control">
          <button (click)="changeQuantity(v.variantId, -1, v.availableStock)" [disabled]="getQuantity(v.variantId) === 0">-</button>
          <span>{{ getQuantity(v.variantId) }}</span>
          <button (click)="changeQuantity(v.variantId, 1, v.availableStock)" [disabled]="getQuantity(v.variantId) >= v.availableStock">+</button>
        </div>

        <span class="line-subtotal" *ngIf="getQuantity(v.variantId) > 0">
          小計 ${{ lineSubTotal(v.dailyRentalPrice, v.variantId) }}
        </span>
      </div>
    </div>
  </div>

  <div class="shipping-section" *ngIf="shippingMethods().length > 0">
    <h3>運送方式</h3>
    <label class="shipping-option" *ngFor="let m of shippingMethods()">
      <input
        type="radio"
        name="shippingMethod"
        [checked]="cart.shippingMethodId() === m.shippingMethodId"
        (change)="selectShippingMethod(m.shippingMethodId)"
      />
      {{ m.methodName }}（運費 ${{ m.baseFee }}）
    </label>
  </div>

  <div class="summary-bar">
    <span>裝備小計（{{ nights() }} 晚）：${{ cartTotal() }}</span>
    <div class="actions">
      <button class="btn-skip" (click)="skip()" [disabled]="submitting()">不需要裝備</button>
      <button class="btn-confirm" (click)="confirm()" [disabled]="submitting()">
        {{ submitting() ? '處理中...' : '確認加購並結帳' }}
      </button>
    </div>
  </div>
</div>
