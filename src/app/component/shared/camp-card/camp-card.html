<a [routerLink]="['/camp', camp.id]" class="camp-card">

  <!-- 圖片區 -->
  <div class="camp-card__img-wrap">
    <img
      [src]="camp.imageUrls?.[currentImageIndex] || 'assets/placeholder.jpg'"
      [alt]="camp.name"
      class="camp-card__img"
    />

    <!-- 愛心收藏 -->
    <button class="camp-card__like" (click)="toggleLike($event)" [class.is-liked]="camp.isLiked">
      <i class="pi" [ngClass]="camp.isLiked ? 'pi-heart-fill' : 'pi-heart'"></i>
    </button>

    <!-- 多圖切換（超過1張才顯示） -->
    <ng-container *ngIf="(camp.imageUrls?.length ?? 0) > 1">
      <button class="camp-card__img-nav camp-card__img-nav--prev" (click)="prevImage($event)">
        <i class="pi pi-chevron-left"></i>
      </button>
      <button class="camp-card__img-nav camp-card__img-nav--next" (click)="nextImage($event)">
        <i class="pi pi-chevron-right"></i>
      </button>
      <div class="camp-card__dots">
        <span
          *ngFor="let img of camp.imageUrls; let i = index"
          class="camp-card__dot"
          [class.active]="i === currentImageIndex"
        ></span>
      </div>
    </ng-container>
  </div>

  <!-- 內容區 -->
  <div class="camp-card__body">

    <div class="camp-card__header">
      <span class="camp-card__name">{{ camp.name }}</span>
    </div>

    <span class="camp-card__area">{{ camp.area }}・海拔 {{ camp.elevation }}m</span>

    <ul class="camp-card__highlights" *ngIf="camp.highlights?.length">
      <li *ngFor="let h of camp.highlights">{{ h }}</li>
    </ul>

    <div class="camp-card__tags" *ngIf="camp.tags?.length">
      <span class="camp-tag" *ngFor="let tag of camp.tags">{{ tag }}</span>
    </div>

    <div class="camp-card__footer">
      <span class="camp-card__price">NT$ {{ camp.basePrice | number }} 起</span>
      <div class="camp-card__rating" *ngIf="camp.averageRating">
        <p-rating [(ngModel)]="camp.averageRating" [readonly]="true" />
        <span class="camp-card__review-count">({{ camp.reviewCount }})</span>
      </div>
    </div>

  </div>
</a>
