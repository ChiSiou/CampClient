<div class="photo-gallery">
  <div class="gallery-header">
    <h3>圖片相簿</h3>
    <label class="btn-upload" [class.uploading]="uploading">
      {{ uploading ? '上傳中...' : '+ 上傳圖片' }}
      <input type="file" accept="image/*" multiple (change)="onFileSelected($event)" [disabled]="uploading" hidden />
    </label>
  </div>

  @if (photos.length === 0) {
    <div class="gallery-empty">尚未上傳任何圖片</div>
  }

  <div class="photo-grid">
    @for (photo of photos; track photo.id) {
      <div class="photo-card">
        <img [src]="resolveImageUrl(photo.url)" alt="照片" />
        @if (photo.isCover) {
          <span class="cover-badge">封面</span>
        }
        <div class="photo-actions">
          <!-- 一定要標 type="button"：這個元件會被放進各編輯頁，如果落在 <form> 裡，
               沒標 type 的按鈕預設是 submit，按「刪除照片」會直接觸發整個表單的儲存+跳頁 -->
          @if (!photo.isCover) {
            <button type="button" (click)="setCover(photo.id)" class="btn-set-cover">設為封面</button>
          }
          <button type="button" (click)="deletePhoto(photo.id)" class="btn-delete">刪除</button>
        </div>
      </div>
    }
  </div>
</div>
