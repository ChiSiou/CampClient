<div class="site-form-page">
  <div class="page-header">
    <div>
      <h2>編輯營位</h2>
      <span class="subtitle">{{ campgroundName }}@if (zoneName) { > {{ zoneName }} }@if (siteNumber) { > {{ siteNumber }} }</span>
    </div>
    <a [routerLink]="['/ownerCenter/camps', campgroundId, 'zones', zoneId, 'sites']" class="btn-back">← 返回營位列表</a>
  </div>

  @if (loading) { <div class="loading">載入中...</div> }

  @if (!loading) {
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>營位編號 <span class="required">*</span></label>
        <input type="text" [(ngModel)]="form.siteNumber" name="siteNumber" placeholder="例：A-01" />
      </div>

      <div class="form-group">
        <label>容納人數</label>
        <input type="number" [(ngModel)]="form.capacityPeople" name="capacityPeople" min="1" />
      </div>

      <div class="form-group">
        <label>狀態</label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" [(ngModel)]="form.siteStatus" name="siteStatus" [value]="1" /> 正常</label>
          <label class="radio-label"><input type="radio" [(ngModel)]="form.siteStatus" name="siteStatus" [value]="0" /> 維護中</label>
        </div>
      </div>

      <div class="form-group">
        <label>描述</label>
        <textarea [(ngModel)]="form.description" name="description" rows="3" placeholder="營位特色、備注..."></textarea>
      </div>

      @if (error) { <div class="error-msg">{{ error }}</div> }

      <div class="form-actions">
        <button type="button" (click)="cancel()" class="btn-cancel">取消</button>
        <button type="submit" [disabled]="submitting" class="btn-submit">{{ submitting ? '儲存中...' : '儲存變更' }}</button>
      </div>
    </form>
  }
</div>
