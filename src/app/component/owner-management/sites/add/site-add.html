<div class="site-form-page">
  <div class="page-header">
    <div>
      <h2>新增營位</h2>
      <span class="subtitle">{{ campgroundName }}@if (zoneName) { > {{ zoneName }} }</span>
    </div>
    <a [routerLink]="['/ownerCenter/camps', campgroundId, 'zones', zoneId, 'sites']" class="btn-back">← 返回營位列表</a>
  </div>

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label>營位編號 <span class="required">*</span></label>
      <input type="text" [(ngModel)]="form.siteNumber" name="siteNumber" placeholder="例：A-01" />
    </div>

    <div class="form-group">
      <label>容納人數</label>
      <input type="number" [(ngModel)]="form.capacityPeople" name="capacityPeople" min="1" />
    </div>

    @if (accomTypes.length > 0) {
      <div class="form-group">
        <label>住宿類型 <span class="required">*</span></label>

        @if (zoneType === 1) {
          <!-- 自備裝備：checkbox 多選 -->
          <div class="accom-list">
            @for (a of accomTypes; track a.id) {
              <label class="accom-item">
                <input type="checkbox" [checked]="isAccomTypeChecked(a.id)" (change)="toggleAccomType(a.id)" />
                <span class="accom-name">{{ a.typeName }}</span>
                <span class="accom-desc">{{ a.description }}</span>
              </label>
            }
          </div>
        }

        @if (zoneType === 2) {
          <!-- 園區住宿：dropdown 單選 -->
          <select [(ngModel)]="form.accomTypeIds[0]" name="accomTypeId" (ngModelChange)="form.accomTypeIds = [$event]">
            <option [ngValue]="undefined" disabled>請選擇住宿類型</option>
            @for (a of accomTypes; track a.id) {
              <option [ngValue]="a.id">{{ a.typeName }}（{{ a.description }}）</option>
            }
          </select>
        }
      </div>
    }

    <div class="form-group">
      <label>描述</label>
      <textarea [(ngModel)]="form.description" name="description" rows="3" placeholder="營位特色、備注..."></textarea>
    </div>

    <div class="form-group">
      <label>營位照片</label>
      <label class="photo-upload-area">
        <input type="file" accept="image/*" multiple (change)="onFilesSelected($event)" hidden />
        ＋ 點此選擇照片（可多選）
      </label>
      @if (previewUrls.length > 0) {
        <div class="photo-preview-list">
          @for (url of previewUrls; track $index) {
            <div class="photo-preview-item">
              <img [src]="url" />
              <button type="button" (click)="removeFile($index)">×</button>
            </div>
          }
        </div>
      }
    </div>

    @if (error) { <div class="error-msg">{{ error }}</div> }

    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn-cancel">取消</button>
      <button type="submit" [disabled]="submitting" class="btn-submit">{{ submitting ? '建立中...' : '建立營位' }}</button>
    </div>
  </form>
</div>
