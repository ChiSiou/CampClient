<div class="camp-add-page">
  <h2>新增營地</h2>

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label>名稱 <span class="required">*</span></label>
      <input type="text" [(ngModel)]="form.name" name="name" placeholder="請輸入營地名稱" />
    </div>

    <div class="form-group">
      <label>聯絡電話 <span class="required">*</span></label>
      <input type="text" [(ngModel)]="form.phone" name="phone" placeholder="例：0912-345-678" />
    </div>

    <div class="form-group">
      <label>描述</label>
      <textarea [(ngModel)]="form.description" name="description" rows="4"
        placeholder="介紹這個營地..."></textarea>
    </div>

    <div class="form-group">
      <label>特色亮點</label>
      <textarea [(ngModel)]="form.highlights" name="highlights" rows="3"
        placeholder="營地的特色亮點..."></textarea>
    </div>

    <div class="form-group">
      <label>營地規則</label>
      <textarea [(ngModel)]="form.rules" name="rules" rows="3"
        placeholder="入住規則、注意事項..."></textarea>
    </div>

    <div class="form-group">
      <label>地區/地址 <span class="required">*</span></label>
      <input type="text" [(ngModel)]="form.area" name="area"
        placeholder="例：南投縣仁愛鄉..." />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>緯度 <span class="required">*</span></label>
        <input type="number" [(ngModel)]="form.latitude" name="latitude"
          step="any" placeholder="e.g. 23.897" />
      </div>
      <div class="form-group">
        <label>經度 <span class="required">*</span></label>
        <input type="number" [(ngModel)]="form.longitude" name="longitude"
          step="any" placeholder="e.g. 120.675" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>海拔（公尺）</label>
        <input type="number" [(ngModel)]="form.elevation" name="elevation"
          placeholder="e.g. 1200" />
      </div>
      <div class="form-group">
        <label>基本價格（元/晚）</label>
        <input type="number" [(ngModel)]="form.basePrice" name="basePrice"
          placeholder="e.g. 500" />
      </div>
    </div>

    <div class="form-group">
      <label>官方網站</label>
      <input type="text" [(ngModel)]="form.website" name="website"
        placeholder="https://..." />
    </div>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <div class="form-actions">
      <button type="button" (click)="cancel()" class="btn-cancel">取消</button>
      <button type="submit" [disabled]="submitting" class="btn-submit">
        {{ submitting ? '建立中...' : '建立營地' }}
      </button>
    </div>
  </form>
</div>
