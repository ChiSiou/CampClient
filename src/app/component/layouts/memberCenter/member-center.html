<div class="member-center">
  <aside class="sidebar">
    <div class="profile-card">
      @if (profilePhotoUrl && !imageLoadFailed) {
      <img class="avatar" [src]="profilePhotoUrl" alt="會員大頭貼" (error)="onAvatarError()" />
      } @else {
      <div class="avatar avatar-placeholder" aria-label="預設會員頭像">
        {{ avatarInitial }}
      </div>
      }

      <h2>{{ name }}</h2>
      <p>會員中心</p>
    </div>

    <nav class="menu">
      <a routerLink="/member-center">個人資料</a>
      <a routerLink="orders">我的訂單</a>
      <a routerLink="/member-center/liked">我的收藏</a>
      <a routerLink="/itinerary">行程清單</a>
      <a routerLink="/notifications">通知中心</a>
      <a (click)="logout()" class="logout">登出</a>
    </nav>
  </aside>

  <router-outlet></router-outlet>
</div>
