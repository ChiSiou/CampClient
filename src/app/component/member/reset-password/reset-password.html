<div class="reset-password-container">
  <h2>重設密碼</h2>

  @if (message) {
    <p class="message">{{ message }}</p>
  }

  @if (userId && token) {
    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>新密碼</label>
        <input
          type="password"
          name="newPassword"
          [(ngModel)]="newPassword"
          placeholder="請輸入新密碼"
          required
        />
      </div>

      <div class="form-group">
        <label>確認新密碼</label>
        <input
          type="password"
          name="confirmPassword"
          [(ngModel)]="confirmPassword"
          placeholder="請再次輸入新密碼"
          required
        />
      </div>

      <button type="submit" [disabled]="loading">
        {{ loading ? '重設中...' : '重設密碼' }}
      </button>
    </form>
  }
</div>
