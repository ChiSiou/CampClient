<div class="edit-page">
  <div class="edit-card">
    <div class="edit-header">
      <h2>編輯會員資料</h2>
      <p>更新你的基本資料、大頭貼與密碼。</p>
    </div>

    @if (message) {
      <div class="form-message" [class.success]="messageType === 'success'" [class.error]="messageType === 'error'">
        {{ message }}
      </div>
    }

    <form class="edit-form" (ngSubmit)="submitEdit()">
      <section class="avatar-section" aria-label="會員大頭貼">
        <div class="avatar-preview">
          @if (profilePhotoPreview && !imageLoadFailed) {
            <img [src]="profilePhotoPreview" alt="會員大頭貼預覽" (error)="onAvatarError()" />
          } @else {
            <span class="avatar-placeholder">{{ avatarInitial }}</span>
          }
        </div>

        <div class="avatar-actions">
          <label class="upload-btn" for="profile-photo">選擇大頭貼</label>
          <input
            id="profile-photo"
            class="file-input"
            type="file"
            name="profilePhoto"
            accept="image/*"
            (change)="onProfilePhotoSelected($event)"
          />
          <p class="file-name">
            {{ selectedProfilePhoto?.name || '尚未選擇新圖片' }}
          </p>
        </div>
      </section>

      <div class="form-group">
        <label for="member-name">姓名</label>
        <input
          id="member-name"
          type="text"
          name="name"
          [(ngModel)]="memberData.name"
          placeholder="請輸入姓名"
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="member-phone">電話</label>
        <input
          id="member-phone"
          type="text"
          name="phone"
          [(ngModel)]="memberData.phone"
          placeholder="請輸入電話"
          autocomplete="tel"
        />
      </div>

      <div class="form-group">
        <label for="member-email">Email</label>
        <input id="member-email" type="email" name="email" [(ngModel)]="memberData.email" disabled />
        <small>Email 目前不可修改</small>
      </div>

      <div class="password-box">
        <h3>修改密碼</h3>
        <p>若不需要修改密碼，以下欄位可留空。</p>

        <div class="form-group">
          <label for="old-password">舊密碼</label>
          <input
            id="old-password"
            type="password"
            name="oldPassword"
            [(ngModel)]="memberData.oldPassword"
            placeholder="請輸入舊密碼"
            autocomplete="current-password"
          />
        </div>

        <div class="form-group">
          <label for="new-password">新密碼</label>
          <input
            id="new-password"
            type="password"
            name="newPassword"
            [(ngModel)]="memberData.newPassword"
            placeholder="請輸入新密碼"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="confirm-password">確認新密碼</label>
          <input
            id="confirm-password"
            type="password"
            name="confirmPassword"
            [(ngModel)]="memberData.confirmPassword"
            placeholder="請再次輸入新密碼"
            autocomplete="new-password"
          />
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn" routerLink="/member-center">取消</button>
        <button type="submit" class="save-btn" [disabled]="submitting">
          {{ submitting ? '儲存中...' : '儲存變更' }}
        </button>
      </div>
    </form>
  </div>
</div>
