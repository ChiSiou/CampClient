<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampGo 登入</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="login-container">

    <div class="logo-section" (click)="quicklogin()">
      <h1>🏕 你的假期</h1>
      <p>探索最美的露營地</p>
    </div>

    <form class="login-form">

      <h2>會員登入</h2>

      <div class="input-group">
        <label>電子信箱</label>
        <input [(ngModel)]="email" name="email" type=" email" placeholder="請輸入 Email">
      </div>

      <div class="input-group">
        <label>密碼</label>
        <input [(ngModel)]='password' name="password" type="password" placeholder="請輸入密碼">
      </div>
      <div class="action-row">
        <label class="remember">

        </label>

        <a routerLink="/forgot-password">忘記密碼？</a>
      </div>
      <button type="button" class="login-btn" (click)="login({email,password})">
        登入
      </button>

      @if (emailconfirmed) {
      <div class="verify-box">
        <p>尚未完成信箱驗證</p>
        <button type="button" class="resend-btn" (click)="Resendpage()">
          重新寄送驗證信
        </button>
      </div>
      }
      <br><br>
      <div class="google-login-wrapper">
        <div id="googleSignInDiv">

        </div>
      </div>

      <div class="divider">
        <span>或</span>
        <button type="button" class="guest-login-btn" (click)="continueAsVisitor()">
          不登入直接瀏覽
        </button>
      </div>

      <p class="register-text">
        還沒有帳號？
        <a routerLink="/register">立即註冊</a>
      </p>

    </form>

  </div>

</body>

</html>
