<div class="register-page">
  <div class="register-card">
    <div class="logo" (click)="quickregistor()">
      <h1>你的假期</h1>
      <p>申請成為營主，建立你的營地管理身分。</p>
    </div>

    <form class="register-form" (ngSubmit)="submitowner()">
      <div class="form-grid">
        <div class="form-group">
          <label for="companyName">公司/營業名稱</label>
          <input id="companyName" [(ngModel)]="ownerData.companyName" name="companyName" type="text"
            placeholder="請輸入公司或營業名稱" />
        </div>

        <div class="form-group">
          <label for="realName">負責人姓名</label>
          <input id="realName" [(ngModel)]="ownerData.realName" name="realName" type="text" placeholder="請輸入負責人姓名" />
        </div>

        <div class="form-group">
          <label for="idNumber">身分證字號/統一編號</label>
          <input id="idNumber" [(ngModel)]="ownerData.idNumber" name="idNumber" type="text"
            placeholder="請輸入身分證字號或統一編號" />
        </div>

        <div class="form-group">
          <label for="contactPhone">聯絡電話</label>
          <input id="contactPhone" [(ngModel)]="ownerData.contactPhone" name="contactPhone" type="tel"
            placeholder="請輸入聯絡電話" />
        </div>

        <div class="form-group full-width">
          <label for="address">聯絡地址</label>
          <input id="address" [(ngModel)]="ownerData.address" name="address" type="text" placeholder="請輸入聯絡地址" />
        </div>

        <div class="form-group">
          <label for="bankName">銀行名稱</label>
          <input id="bankName" [(ngModel)]="ownerData.bankName" name="bankName" type="text" placeholder="例：台灣銀行" />
        </div>

        <div class="form-group">
          <label for="bankAccount">銀行帳號</label>
          <input id="bankAccount" [(ngModel)]="ownerData.bankAccount" name="bankAccount" type="text"
            placeholder="請輸入銀行帳號" />
        </div>

        <div class="form-group full-width">
          <label for="bankAccountName">帳戶戶名</label>
          <input id="bankAccountName" [(ngModel)]="ownerData.bankAccountName" name="bankAccountName" type="text"
            placeholder="請輸入帳戶戶名" />
        </div>
      </div>

      <div class="photo-upload">
        <div class="upload-copy">
          <label class="file-btn" for="owner-license-file">上傳大頭貼</label>
          <input id="owner-license-file" type="file" accept="image/*" (change)="onFileSelected($event)" hidden />
          <span>{{ selectedFile?.name || '尚未選擇檔案' }}</span>
        </div>

        @if (previewUrl) {
        <img [src]="previewUrl" class="preview-img" alt="證件照片預覽" />
        }
      </div>

      <button type="submit" class="upload-btn" [disabled]="loading">
        {{ loading ? '送出中...' : '送出申請' }}
      </button>
    </form>
  </div>
</div>
