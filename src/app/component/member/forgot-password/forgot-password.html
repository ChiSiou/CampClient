<div class="forgot-password-container">
  <h2>忘記密碼</h2>

  <p>請輸入你的註冊信箱，系統會寄送重設密碼連結。</p>

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="email"
        placeholder="請輸入 Email"
        required
      />
    </div>

    <button type="submit" [disabled]="loading">
      {{ loading ? '寄送中...' : '寄送重設密碼信' }}
    </button>
  </form>

  @if (message) {
    <p class="message">{{ message }}</p>
  }

  <button type="button" class="back-btn" routerLink="/login">
    返回登入
  </button>
</div>
